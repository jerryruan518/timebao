name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl
          
      - name: Verify Flutter installation
        run: flutter doctor -v
          
      - name: Build APK (non‑interactive)
        run: |
          # 强制 Flet 使用已安装的 Flutter，避免它尝试自动安装
          export FLUTTER_ROOT=${{ steps.setup-flutter.outputs.flutter-path }}
          flet build apk --split-per-abi --verbose
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: timebao-apk
          path: build/apk/
