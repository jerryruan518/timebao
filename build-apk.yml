name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flet
        run: pip install flet
      - name: Build APK
        run: flet build apk --split-per-abi --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: timebao-apk
          path: build/apk/
