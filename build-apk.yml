name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: List files (debug)
        run: ls -la
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
      - name: Build APK
        run: flet build apk --split-per-abi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: timebao-apk
          path: build/apk/
