name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'   # 更新到较新稳定版
          channel: 'stable'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl
          
      - name: Build APK
        run: flet build apk --split-per-abi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: timebao-apk
          path: build/apk/
